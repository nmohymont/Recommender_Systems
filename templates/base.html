<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieMatch</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar">
    <div class="logo">MovieMatch</div>
    <div class="nav-links">
      <a href="{{ url_for('home') }}"       {% if request.endpoint == 'home'       %}class="active"{% endif %}>Discover</a>
      <a href="{{ url_for('individual') }}" {% if request.endpoint == 'individual' %}class="active"{% endif %}>For You</a>
      <a href="{{ url_for('group') }}"      {% if request.endpoint == 'group'      %}class="active"{% endif %}>Movie Night</a>
    </div>
  </nav>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
